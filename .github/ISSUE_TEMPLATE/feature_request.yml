name: Feature Request
description: Suggest a new feature for VaultKey
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Help us understand what you need.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: "I'm building a multi-chain wallet and need to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you solve this?
      placeholder: "Add a new endpoint POST /wallets/batch that accepts an array of..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you think about?
      placeholder: "I considered calling POST /wallets in a loop, but that's too slow because..."

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How critical is this for you?
      options:
        - Nice to have
        - Important
        - Critical - blocking our use case
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you like to contribute this feature?
      options:
        - label: I'm willing to submit a PR for this feature
          required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Links, examples, mockups, etc.