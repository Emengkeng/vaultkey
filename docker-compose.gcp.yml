version: "3.9"

# docker-compose.gcp.yml
#
# Use this instead of docker-compose.yml when running on Google Cloud.
# Vault is removed. KMS is handled by GCP Cloud KMS.
#
# Required env vars (set in .env or your CI/CD secret manager):
#
#   GCP_KMS_KEY_NAME=projects/{project}/locations/{location}/keyRings/{ring}/cryptoKeys/{key}/cryptoKeyVersions/{version}
#   GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/gcp-sa-key.json
#
# Authentication options (pick one):
#   1. Service account key file — mount it as a secret (shown below)
#   2. Workload Identity (GKE) — remove the volume mount and credentials env var,
#      the SDK picks up the metadata server automatically
#
# Usage:
#   docker compose -f docker-compose.gcp.yml up

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vaultkey
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: vaultkey
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultkey"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redischangeme}
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redischangeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: postgres://vaultkey:${POSTGRES_PASSWORD:-changeme}@postgres:5432/vaultkey?sslmode=disable

      # KMS
      KMS_PROVIDER: gcp
      GCP_KMS_KEY_NAME: ${GCP_KMS_KEY_NAME}
      # Remove GOOGLE_APPLICATION_CREDENTIALS if using Workload Identity
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-sa-key.json

      # Redis
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redischangeme}

      # Worker
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
      WORKER_POLL_TIMEOUT_SEC: 5

      # EVM RPC endpoints
      EVM_RPC_1: ${EVM_RPC_1:-https://cloudflare-eth.com}
      EVM_RPC_137: ${EVM_RPC_137:-https://polygon-rpc.com}
      EVM_RPC_42161: ${EVM_RPC_42161:-https://arb1.arbitrum.io/rpc}
      EVM_RPC_8453: ${EVM_RPC_8453:-https://mainnet.base.org}
      EVM_RPC_10: ${EVM_RPC_10:-https://mainnet.optimism.io}

      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
    ports:
      - "8080:8080"
    volumes:
      # Mount service account key — use Docker secrets or your secret manager
      # in production instead of a plain file mount.
      - ${GCP_SA_KEY_FILE:-./secrets/gcp-sa-key.json}:/run/secrets/gcp-sa-key.json:ro
    networks:
      - internal
      - external

networks:
  internal:
    internal: true
  external:
    internal: false

volumes:
  postgres_data:
  redis_data: