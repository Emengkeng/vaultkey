services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vaultkey
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: vaultkey
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultkey"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redischangeme}
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redischangeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  vault:
    image: hashicorp/vault:1.15
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
      - ./config/vault.hcl:/vault/config/vault.hcl:ro
      - ./scripts:/scripts:ro
    networks:
      - internal
    command: server
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_API_ADDR: http://0.0.0.0:8200
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries=1", "http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  vault-init:
    image: python:3-alpine
    restart: on-failure
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_MOUNT_PATH: transit
      VAULT_KEY_NAME: vaultkey-master
    volumes:
      - vault_data:/vault/data
      - ./scripts:/scripts:ro
    entrypoint: ["sh", "-c", "apk add --no-cache curl && sh /scripts/vault-init.sh"]
    networks:
      - internal
      - external  # Needs external to install curl via apk

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      PORT: 8080
      DATABASE_URL: postgres://vaultkey:${POSTGRES_PASSWORD:-changeme}@postgres:5432/vaultkey?sslmode=disable
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN_FILE: /vault/data/root_token
      VAULT_MOUNT_PATH: transit
      VAULT_KEY_NAME: vaultkey-master
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redischangeme}

      # Worker config
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
      WORKER_POLL_TIMEOUT_SEC: 5

      # EVM RPC endpoints
      EVM_RPC_11155111: ${EVM_RPC_1:-https://eth-sepolia.public.blastapi.io}
      EVM_RPC_80001: ${EVM_RPC_137:-https://rpc-mumbai.maticvigil.com}
      EVM_RPC_421614: ${EVM_RPC_42161:-https://sepolia-rollup.arbitrum.io/rpc}
      EVM_RPC_84532: ${EVM_RPC_8453:-https://sepolia.base.org}
      EVM_RPC_11155420: ${EVM_RPC_10:-https://sepolia.optimism.io}

      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}

      ADMIN_TOKEN: ${ADMIN_TOKEN}
      ENVIRONMENT: ${ENVIRONMENT:-testnet}
      PLARTFORM_SUPPORT_EMAIL: ${PLARTFORM_SUPPORT_EMAIL:-
      ENABLE_CLOUD_FEATURES: ${ENABLE_CLOUD_FEATURES:-false}
      TESTNET_MAX_PROJECTS: ${TESTNET_MAX_PROJECTS:-2}
      TESTNET_MAX_MEMBERS: ${TESTNET_MAX_MEMBERS:-3}
      TESTNET_MAX_API_KEYS: ${TESTNET_MAX_API_KEYS:-3}

      # Clerk authentication (required if ENABLE_CLOUD_FEATURES=true)
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}

      # Stripe keys (for billing features, required if ENABLE_CLOUD_FEATURES=true)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      ENABLE_TEST_UI: ${ENABLE_TEST_UI:-false}
    ports:
      - "8080:8080"
    volumes:
      - vault_data:/vault/data:ro
    networks:
      - internal
      - external

networks:
  internal:
    internal: true   # Vault, Redis, Postgres unreachable from outside
  external:
    internal: false  # Only the API is exposed

volumes:
  postgres_data:
  redis_data:
  vault_data: